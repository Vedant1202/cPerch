name: Release

# Cut a release by pushing a version tag (scripts/release.sh does this). This builds the app on a
# macOS runner, packages a zip + a DMG, and publishes a GitHub Release with the matching CHANGELOG
# section as the notes. workflow_dispatch lets you re-run for an existing tag (fix-forward).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to (re)build, e.g. v0.6.0"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Package.swift needs Swift tools 6.0; the runner's default Xcode may be older, so select the
      # newest installed Xcode (Swift 6+). Package.swift pins .macOS(.v14), so the SDK doesn't change
      # the deployment target — the build still runs on macOS 14+.
      - name: Select the latest Xcode (Swift 6+)
        run: |
          LATEST="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST"
          swift --version

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build the app bundle
        run: ./build.sh

      - name: Package zip + DMG
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${{ steps.v.outputs.version }}"
          ZIP="CPerch-$VERSION.zip"
          DMG="CPerch-$VERSION.dmg"

          # Zip with ditto so the .app's symlinks/metadata survive (plain `zip` mangles bundles).
          ditto -c -k --sequesterRsrc --keepParent dist/CPerch.app "$ZIP"

          # DMG: app + a drag-to-Applications symlink, via hdiutil (zero external deps).
          STAGE="$(mktemp -d)"
          cp -R dist/CPerch.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "cPerch" -srcfolder "$STAGE" -fs HFS+ -format UDZO -ov "$DMG"

          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

          # Stable "latest" aliases so the website can link to a permanent URL —
          # github.com/.../releases/latest/download/cPerch-macos.dmg always points at the newest
          # release. Plain copies of the versioned artifacts (same bytes, version-less names).
          cp "$ZIP" cPerch-macos.zip
          cp "$DMG" cPerch-macos.dmg

      - name: Extract changelog notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.v.outputs.version }}"
          # Print the body of the "## [VERSION]" section, stopping at the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          # Trim leading/trailing blank lines; fall back to a stub if the section was empty.
          sed -i '' -e '/./,$!d' notes.md 2>/dev/null || true
          [ -s notes.md ] || echo "cPerch $VERSION" > notes.md
          echo "----- release notes -----"; cat notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: cPerch ${{ steps.v.outputs.version }}
          body_path: notes.md
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.dmg }}
            cPerch-macos.zip
            cPerch-macos.dmg
